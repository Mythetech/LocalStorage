name: Deploy Sample Site

env:
  PUBLISH_DIR: samples/BlazorWebAssembly/bin/Release/net10.0/publish/wwwroot

on:
  push:
    paths:
      - samples/**
      - src/**
      - ".github/workflows/static.yml"
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0"

      - name: Install .NET WASM workload
        run: dotnet workload install wasm-tools

      - name: Run Tests
        run: dotnet test tests/Mythetech.LocalStorage.Tests

  deploy:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0"

      - name: Install .NET WASM workload
        run: dotnet workload install wasm-tools

      - name: Publish Sample Site
        run: dotnet publish -c Release samples/BlazorWebAssembly/BlazorWebAssembly.csproj

      - name: Rewrite base href
        uses: SteveSandersonMS/ghaction-rewrite-base-href@v1
        with:
          html_path: ${{ env.PUBLISH_DIR }}/index.html
          base_href: /LocalStorage/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PUBLISH_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
